version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: qsc-orchestration-postgres
    environment:
      POSTGRES_USER: qsc_user
      POSTGRES_PASSWORD: qsc_password
      POSTGRES_DB: qsc_orchestration
    ports:
      - '5432:5432'
    volumes:
      - qsc_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U qsc_user -d qsc_orchestration']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  qsc_postgres_data:
